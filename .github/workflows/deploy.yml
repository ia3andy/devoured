name: Roq Site Deploy

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["Daily Digest"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      # Temporary: build Roq from source to get the ClassTooLargeException fix
      # Remove this block once Roq 2.1.7+ is released
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          repository: quarkiverse/quarkus-roq
          path: quarkus-roq
      - name: Build Roq from source
        working-directory: quarkus-roq
        run: mvn install -DskipTests -ntp
      - name: Generate Roq Site
        uses: quarkiverse/quarkus-roq@d0bdb4255f4dcc3ddd218c83f9dd19faa823ac31 # v1.1
        with:
          setup-java: 'false'
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          maven-build-args: '-DskipTests -Droq.version=999-SNAPSHOT'
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
      - name: Notify IndexNow
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"host":"devoured.fyi","key":"0D7BA173-F348-4235-8F27-DA39390BC11E","keyLocation":"https://devoured.fyi/0D7BA173-F348-4235-8F27-DA39390BC11E.txt","urlList":["https://devoured.fyi/","https://devoured.fyi/sitemap.xml"]}'
