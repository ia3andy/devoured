name: Daily Digest

on:
  schedule:
    - cron: '47 3 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave empty for auto-backfill.'
        required: false
      max_articles:
        description: 'Max articles per feed (for testing). Leave empty for unlimited.'
        required: false

concurrency:
  group: daily-digest
  cancel-in-progress: true

permissions:
  contents: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jbangdev/setup-jbang@main

      - name: Cache jbang dependencies
        uses: actions/cache@v4
        with:
          path: ~/.jbang/cache
          key: jbang-deps-${{ hashFiles('scripts/DigestHelper.java') }}
          restore-keys: jbang-deps-

      - name: Restore digest cache
        uses: actions/cache/restore@v4
        with:
          path: .digest-cache
          key: digest-cache-${{ github.run_id }}
          restore-keys: digest-cache-

      - name: Generate digest
        env:
          AI_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_APP: ${{ secrets.FB_APP }}
          FB_SECRET: ${{ secrets.FB_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          if [ -n "${{ inputs.max_articles }}" ]; then
            ARGS="$ARGS --max-articles ${{ inputs.max_articles }}"
          fi
          jbang scripts/DigestHelper.java generate $ARGS

      - name: Save digest cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .digest-cache
          key: digest-cache-${{ github.run_id }}

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ templates/full-content/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "digest: add dev digest posts"
            git push
          fi
