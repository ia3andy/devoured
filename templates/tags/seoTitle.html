{@java.lang.String pageTitle}
{@java.lang.String siteTitle}
{@java.lang.String seoTitle=pageTitle}

{#if seoTitle || siteTitle}
  <!-- SEO TITLE -->
  {#if seoTitle ne pageTitle}
  <title>{seoTitle}</title>
  {#else if pageTitle && pageTitle ne siteTitle}
  <title>{pageTitle} - {siteTitle}</title>
  {#else}
  <title>{siteTitle}</title>
  {/if}
  <meta property="og:title" content="{seoTitle ?: siteTitle}" />
  <meta name="twitter:title" content="{seoTitle ?: siteTitle}">
{/if}
{#if siteTitle}
  <meta property="og:site_name" content="{siteTitle}">
{/if}
